<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Intelligence Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F7F5;
      --surface:   #FFFFFF;
      --border:    #E8E8E4;
      --text:      #1A1A18;
      --muted:     #8A8A82;
      --accent:    #2563EB;
      --accent-lt: #EEF3FF;
      --ai-bg:     #FFFFFF;
      --user-bg:   #2563EB;
      --user-text: #FFFFFF;
      --tag-bg:    #F0F0EC;
      --tag-text:  #5A5A52;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --radius:    14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }
    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22C55E;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Suggestions ── */
    .suggestions {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .chip {
      font-size: 12px;
      font-weight: 500;
      color: var(--tag-text);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .chip:hover {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--muted);
      text-align: center;
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 4px;
    }
    .empty-state h2 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }
    .empty-state p {
      font-size: 13px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.6;
    }
    .categories {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-top: 8px;
    }
    .cat-tag {
      font-size: 11px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--tag-text);
      border-radius: 20px;
      padding: 4px 10px;
    }

    /* Message bubbles */
    .msg-row {
      display: flex;
      gap: 10px;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.ai-avatar {
      background: var(--accent);
      color: white;
    }

    .bubble {
      max-width: min(520px, 80vw);
      border-radius: var(--radius);
      padding: 12px 15px;
      line-height: 1.6;
      font-size: 14px;
      box-shadow: var(--shadow);
    }
    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: var(--ai-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .tool-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-lt);
      border-radius: 4px;
      padding: 2px 7px;
      margin-bottom: 7px;
    }

    /* Loading animation */
    .loading-bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .dot-bounce {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot-bounce:nth-child(2) { animation-delay: 0.2s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Fade-in for new messages */
    .fade-in {
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Error bubble */
    .bubble.error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
    }

    /* ── Input bar ── */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .input-inner {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #questionInput {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 15px;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #questionInput::placeholder { color: var(--muted); }
    #questionInput:focus { border-color: var(--accent); }

    #sendBtn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #sendBtn:hover { background: #1D4ED8; }
    #sendBtn:active { transform: scale(0.97); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .suggestions { padding: 10px 16px; gap: 6px; }
      #messages { padding: 16px; gap: 12px; }
      .input-bar { padding: 12px 16px; }
      .bubble { font-size: 13px; }
      .logo-text p { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">
      <h1>Campus Intelligence</h1>
      <p>Library · Cafeteria · Events · Academics · Placements</p>
    </div>
  </div>
  <div class="status-dot">
    <span class="dot"></span>
    <span>Live</span>
  </div>
</header>

<!-- Suggestions -->
<div class="suggestions">
  <button class="chip" onclick="setQ('Is Harry Potter available in library?')">📚 Harry Potter available?</button>
  <button class="chip" onclick="setQ('What is for lunch on Monday?')">🍽️ Monday lunch menu</button>
  <button class="chip" onclick="setQ('Any technical events coming up?')">🔧 Technical events</button>
  <button class="chip" onclick="setQ('What is the attendance rule?')">📋 Attendance rule</button>
  <button class="chip" onclick="setQ('What is Google package?')">💼 Google package</button>
  <button class="chip" onclick="setQ('When are mid semester exams?')">📝 Exam schedule</button>
</div>

<!-- Messages -->
<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🏫</div>
    <h2>How can I help you today?</h2>
    <p>Ask me anything about your campus — books, food, events, exams, or placements.</p>
    <div class="categories">
      <span class="cat-tag">📚 Library</span>
      <span class="cat-tag">🍽️ Cafeteria</span>
      <span class="cat-tag">🎯 Events</span>
      <span class="cat-tag">📋 Academics</span>
      <span class="cat-tag">💼 Placements</span>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-inner">
    <input
      id="questionInput"
      type="text"
      placeholder="Ask about library, cafeteria, events, academics, placements..."
      onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); askQuestion(); }"
      autocomplete="off"
    />
    <button id="sendBtn" onclick="askQuestion()">Ask →</button>
  </div>
</div>

<script>
  const BACKEND = 'http://127.0.0.1:8000';

  function setQ(text) {
    const input = document.getElementById('questionInput');
    input.value = text;
    input.focus();
  }

  function removeEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function addMessage(role, text, toolUsed) {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role} fade-in`;

    if (role === 'ai') {
      const avatar = document.createElement('div');
      avatar.className = 'avatar ai-avatar';
      avatar.textContent = '✦';
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;

    if (role === 'ai' && toolUsed && toolUsed !== 'none') {
      const tag = document.createElement('div');
      tag.className = 'tool-tag';
      tag.innerHTML = `⚙ ${toolUsed.replace(/_/g, ' ')}`;
      bubble.appendChild(tag);
    }

    const p = document.createElement('p');
    p.textContent = text;
    bubble.appendChild(p);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function addLoading() {
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ai fade-in';
    row.id = 'loadingRow';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai-avatar';
    avatar.textContent = '✦';
    row.appendChild(avatar);

    const bubble = document.createElement('div');
    bubble.className = 'bubble ai loading-bubble';
    bubble.innerHTML = '<div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div>';
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeLoading() {
    const el = document.getElementById('loadingRow');
    if (el) el.remove();
  }

  async function askQuestion() {
    const input = document.getElementById('questionInput');
    const btn = document.getElementById('sendBtn');
    const question = input.value.trim();
    if (!question) return;

    removeEmpty();
    addMessage('user', question);
    input.value = '';
    btn.disabled = true;
    addLoading();

    try {
      const res = await fetch(`${BACKEND}/ask?question=${encodeURIComponent(question)}`);
      const data = await res.json();
      removeLoading();
      addMessage('ai', data.answer, data.tool_used);
    } catch (err) {
      removeLoading();
      const container = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row ai fade-in';
      const bubble = document.createElement('div');
      bubble.className = 'bubble error';
      bubble.textContent = 'Could not reach the server. Make sure the backend is running on port 8000.';
      row.appendChild(bubble);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
